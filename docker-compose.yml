services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
      - HYBRID_PRELOAD_RSU_GRAPH=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      server:
        condition: service_healthy

  simulation:
    build:
      context: .
      dockerfile: Dockerfile.sumo
    depends_on:
      server:
        condition: service_healthy
    command: >
      python -u sumo/run_sumo_pipeline.py
      --scenario kolkata
      --seed 11
      --max-steps 3600
      --traffic-scale 1.0
      --rsu-config data/rsu_config_kolkata.json
      --rsu-range-m 120
      --rsu-min-inc-lanes 4
      --controlled-count 30
      --controlled-source "9491482575"
      --controlled-destination "cluster_10281986033_10302557856_10302557859_638354058"
      --controlled-begin 10
      --controlled-end 600
      --force-congestion-at-junction "cluster_10281869257_12438122826_12438122827_663940666"
      --force-congestion-at-step 60
      --reroute-highlight-seconds 3600
      --enable-tgcn
      --tgcn-train
      --tgcn-log-interval 50
      --tgcn-checkpoint-dir models/tgcn
      --enable-hybrid-uplink-stub
      --server-url http://server:5000
      --hybrid-batch-seconds 5
      --route-timeout-seconds 1.5
      --enable-rl-signal-control
      --rl-model-dir models/rl/artifacts/research_backed_kolkata_reference_v2
      --rl-min-green-seconds 15
      --rl-yellow-duration-seconds 3
      --rl-max-controlled-tls 96
      --rl-step-interval-steps 5
      --enable-runtime-logging
      --runtime-log-root data/raw
      --marker-refresh-steps 4
      --emergency-corridor-lookahead-edges 6
      --emergency-hold-seconds 8
    volumes:
      - .:/app
